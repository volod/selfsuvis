<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Index Video</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    label { font-weight: 500; }
    input[type="url"], input[type="password"] { padding: 0.5rem; font-size: 1rem; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
    .hint { font-size: 0.875rem; color: #6c757d; }
    .divider { margin: 0.5rem 0; font-size: 0.875rem; color: #6c757d; }
    p a { color: #0d6efd; }
    #result p { padding: 0.5rem; border-radius: 4px; margin: 0; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>Index Video</h1>
  <p>Upload a local video file, use a local path, or enter a URL to index for semantic search.</p>
  <form id="indexForm">
    <label for="file">Local video file</label>
    <input type="file" id="file" name="file" accept=".mp4,.mov,.mkv,.avi">
    <div class="divider">or</div>
    <label for="path">Local server path</label>
    <input type="text" id="path" name="path" placeholder="/.data/videos/example.mp4">
    <div class="divider">or</div>
    <label for="url">Video URL (HTTP/HTTPS)</label>
    <input type="text" id="url" name="url" placeholder="https://example.com/video.mp4" inputmode="url">
    <label><input type="checkbox" id="enable_tiles" name="enable_tiles" checked> Enable tile indexing</label>
    <label for="api_key">API key <span class="hint">(optional, if configured)</span></label>
    <input type="password" id="api_key" name="api_key" placeholder="Leave empty if not required" autocomplete="off">
    <button type="submit">Index Video</button>
  </form>
  <div id="result"></div>
  <p><a href="/docs">API docs</a></p>
  <script>
    document.getElementById('indexForm').onsubmit = async function(e) {
      e.preventDefault();
      const fileInput = document.getElementById('file');
      const pathInput = document.getElementById('path').value.trim();
      const urlInput = document.getElementById('url').value.trim();
      const enableTiles = document.getElementById('enable_tiles').checked;
      const apiKey = document.getElementById('api_key').value.trim();
      const result = document.getElementById('result');
      result.innerHTML = '';
      const headers = {};
      if (apiKey) headers['X-API-Key'] = apiKey;
      if (fileInput.files && fileInput.files.length > 0) {
        const fd = new FormData();
        fd.append('file', fileInput.files[0]);
        fd.append('enable_tiles', enableTiles ? 'true' : 'false');
        try {
          const r = await fetch('/index/video', { method: 'POST', headers, body: fd });
          const data = await r.json().catch(() => ({}));
          if (r.ok) {
            result.innerHTML = '<p class="success">Job created: ' + (data.job_id || data.video_id) + '</p>';
          } else {
            result.innerHTML = '<p class="error">' + (data.detail || r.statusText || 'Error') + '</p>';
          }
        } catch (err) {
          result.innerHTML = '<p class="error">' + err.message + '</p>';
        }
      } else if (pathInput) {
        headers['Content-Type'] = 'application/x-www-form-urlencoded';
        const body = 'path=' + encodeURIComponent(pathInput) + '&enable_tiles=' + enableTiles;
        try {
          const r = await fetch('/index/video', { method: 'POST', headers, body });
          const data = await r.json().catch(() => ({}));
          if (r.ok) {
            result.innerHTML = '<p class="success">Job created: ' + (data.job_id || data.video_id) + '</p>';
          } else {
            result.innerHTML = '<p class="error">' + (data.detail || r.statusText || 'Error') + '</p>';
          }
        } catch (err) {
          result.innerHTML = '<p class="error">' + err.message + '</p>';
        }
      } else if (urlInput) {
        headers['Content-Type'] = 'application/x-www-form-urlencoded';
        const body = 'url=' + encodeURIComponent(urlInput) + '&enable_tiles=' + enableTiles;
        try {
          const r = await fetch('/index/url', { method: 'POST', headers, body });
          const data = await r.json().catch(() => ({}));
          if (r.ok) {
            result.innerHTML = '<p class="success">Job created: ' + (data.job_id || data.video_id) + '</p>';
          } else {
            result.innerHTML = '<p class="error">' + (data.detail || r.statusText || 'Error') + '</p>';
          }
        } catch (err) {
          result.innerHTML = '<p class="error">' + err.message + '</p>';
        }
      } else {
        result.innerHTML = '<p class="error">Select a file, local path, or URL.</p>';
      }
    };
  </script>
</body>
</html>
