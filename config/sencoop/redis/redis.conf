# ChirpStack Redis configuration
#
# vm.overcommit_memory: must be 1 on the host for safe background saves.
# Apply on the host once (or via coop-bootstrap if run as root):
#   sudo sysctl vm.overcommit_memory=1
#   echo 'vm.overcommit_memory = 1' | sudo tee /etc/sysctl.d/99-coop.conf
#   sudo sysctl -p /etc/sysctl.d/99-coop.conf

# Suppress the log-level warning inside the container (the host setting is the real fix).
ignore-warnings OVERCOMMIT-MEMORY

# AOF persistence: safe default for ChirpStack session/device state.
appendonly yes
appendfsync everysec

# No RDB snapshots (ChirpStack reconstructs from PostgreSQL on restart).
save ""
