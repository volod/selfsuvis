worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Increase buffer sizes for CVAT's larger API responses
    proxy_buffer_size   128k;
    proxy_buffers       4 256k;
    proxy_busy_buffers_size 256k;

    # Large uploads (annotation files, video imports)
    client_max_body_size 10G;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;

    upstream cvat_server {
        server cvat_server:8080;
    }

    upstream cvat_ui {
        server cvat_ui:80;
    }

    server {
        listen 80;
        server_name _;

        # Django API, static assets, admin, RQ dashboard
        location ~ ^/(api|static|admin|documentation|django-rq) {
            proxy_pass http://cvat_server;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → React UI
        location / {
            proxy_pass http://cvat_ui;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
