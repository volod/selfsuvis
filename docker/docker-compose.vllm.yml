# docker/docker-compose.vllm.yml — Phase 2 vLLM sidecar for Qwen2.5-VL-7B
# Usage (from project root):
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.vllm.yml up
#
# Environment variables (set in .env or shell):
#   QWEN_VLLM_MODEL             HuggingFace model ID   (default: Qwen/Qwen2.5-VL-7B-Instruct)
#   VLLM_GPU_MEMORY_UTILIZATION fraction of GPU for vLLM (default: 0.5)
#   VLLM_MAX_NUM_SEQS           concurrent sequences    (default: 4)
#   VLLM_MAX_MODEL_LEN          context window          (default: 128000 — full Qwen2.5-VL native context)
#   VLLM_WORKER_RESERVE_GB      GB to reserve for worker stack (default: 4)
#
# TurboQuant features (enabled by vllm_entrypoint.sh):
#   --kv-cache-dtype fp8_e5m2   FP8 KV cache (halves KV memory vs FP16)
#   --enable-chunked-prefill    chunked prefill for large prompts
#   --dtype bfloat16            BF16 weights (TF32 matmuls on Ampere+)
#
# Adaptive CPU offload:
#   vllm_entrypoint.sh reads nvidia-smi memory.total and memory.used (which
#   includes ALL GPU consumers — X11, other ML workers, etc.) and computes
#   --cpu-offload-gb = max(0, 14 - available + 1) so Qwen never OOMs.
#   VLLM_WORKER_RESERVE_GB controls how much to leave for the worker stack.

services:
  qwen:
    image: vllm/vllm-openai:latest
    entrypoint: ["/bin/bash", "/app/vllm_entrypoint.sh"]
    volumes:
      - vllm_models:/root/.cache/huggingface
      - ./vllm_entrypoint.sh:/app/vllm_entrypoint.sh:ro
    environment:
      VLLM_MODEL: "${QWEN_VLLM_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}"
      VLLM_GPU_UTIL: "${VLLM_GPU_MEMORY_UTILIZATION:-0.5}"
      VLLM_MAX_SEQS: "${VLLM_MAX_NUM_SEQS:-4}"
      VLLM_MAX_LEN: "${VLLM_MAX_MODEL_LEN:-128000}"
      VLLM_WORKER_RESERVE_GB: "${VLLM_WORKER_RESERVE_GB:-4}"
    ports:
      - "8010:8000"
    ipc: host
    shm_size: "8g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  vllm_models:
