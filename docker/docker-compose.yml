# Run all services as current host user so data/cache dirs are owned by you.
# Requires: UID and GID env vars (make up sets these automatically).
# Loads env/prod.env by default; set APP_ENV=dev or APP_ENV=test to use other env files.

services:
  postgres:
    image: postgres:16-alpine
    user: "0:0"
    environment:
      POSTGRES_USER: selfsuvis
      POSTGRES_PASSWORD: selfsuvis
      POSTGRES_DB: selfsuvis
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfsuvis"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    build:
      context: ..
      dockerfile: docker/Dockerfile.qdrant
    user: "0:0"
    environment:
      - UID=${UID:-1000}
      - GID=${GID:-1000}
    ports:
      - "6333:6333"
    volumes:
      - ../data/qdrant:/qdrant/storage
      - ../docker/qdrant-config.yaml:/qdrant/config/config.yaml:ro

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - ../env/prod.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/app/data
      - DATABASE_URL=postgresql://selfsuvis:selfsuvis@postgres:5432/selfsuvis
      - HOME=/app/cache
      - XDG_CACHE_HOME=/app/cache
      - TORCH_HOME=/app/cache/torch
      - OPENCLIP_CACHE_DIR=/app/cache/open_clip
    volumes:
      - ../data:/app/data
      - ../cache:/app/cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - ../env/prod.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/app/data
      - DATABASE_URL=postgresql://selfsuvis:selfsuvis@postgres:5432/selfsuvis
      - HOME=/app/cache
      - XDG_CACHE_HOME=/app/cache
      - TORCH_HOME=/app/cache/torch
      - OPENCLIP_CACHE_DIR=/app/cache/open_clip
    volumes:
      - ../data:/app/data
      - ../cache:/app/cache
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - ../env/prod.env
    environment:
      - API_URL=http://api:8000
      - DATA_DIR=/app/data
    volumes:
      - ../data:/app/data
    ports:
      - "8501:8501"
    depends_on:
      - api

  nginx:
    image: nginx:1.25-alpine
    user: "0:0"
    volumes:
      - ../docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../data:/app/data:ro
    ports:
      - "8080:8080"
    depends_on:
      - api

  mediamtx:
    image: bluenviron/mediamtx:1.9.0
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8889:8889"   # WebRTC
    environment:
      MTX_PROTOCOLS: tcp
