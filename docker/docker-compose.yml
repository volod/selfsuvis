services:
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
    volumes:
      - ../data/qdrant:/qdrant/storage

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/app/data
    volumes:
      - ../data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/app/data
    volumes:
      - ../data:/app/data
    depends_on:
      - qdrant
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    environment:
      - API_URL=http://api:8000
      - DATA_DIR=/app/data
    volumes:
      - ../data:/app/data
    ports:
      - "8501:8501"
    depends_on:
      - api
