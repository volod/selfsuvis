# Run all services as current host user so data/cache dirs are owned by you.
# Requires: UID and GID env vars (make up sets these automatically).
# Container env priority: shell `environment:` > DATA_DIR/.env (optional) >
# packaged prod defaults in src/selfsuvis/env/prod.env.

services:
  redis:
    image: redis:7-alpine
    user: "${UID:-1000}:${GID:-1000}"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - ${DATA_DIR:-../../.data}/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      POSTGRES_USER: selfsuvis
      POSTGRES_PASSWORD: selfsuvis
      POSTGRES_DB: selfsuvis
    volumes:
      - ${DATA_DIR:-../../.data}/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfsuvis"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    build:
      context: ../..
      dockerfile: docker/qdrant/Dockerfile.qdrant
    user: "0:0"
    environment:
      - UID=${UID:-1000}
      - GID=${GID:-1000}
    ports:
      - "6333:6333"
    volumes:
      - ${DATA_DIR:-../../.data}/qdrant:/qdrant/storage
      - ../../config/qdrant/qdrant.yaml:/qdrant/config/config.yaml:ro

  api:
    build:
      context: ../..
      dockerfile: docker/core/Dockerfile.api
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - path: ../../src/selfsuvis/env/prod.env
        required: true
      - path: ${DATA_DIR:-../../.data}/.env
        required: false
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/app/data
      - DATABASE_URL=postgresql://selfsuvis:selfsuvis@postgres:5432/selfsuvis
      - REDIS_URL=redis://redis:6379/0
      - HOME=/app/cache
      - XDG_CACHE_HOME=/app/cache
      - TORCH_HOME=/app/cache/torch
      - OPENCLIP_CACHE_DIR=/app/cache/open_clip
      - TORCHINDUCTOR_CACHE_DIR=/app/cache/inductor
      - LOGNAME=app
    volumes:
      - ${DATA_DIR:-../../.data}:/app/data
      - ${CACHE_DIR:-${DATA_DIR:-../../.data}/.cache}:/app/cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  worker:
    build:
      context: ../..
      dockerfile: docker/core/Dockerfile.worker
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - path: ../../src/selfsuvis/env/prod.env
        required: true
      - path: ${DATA_DIR:-../../.data}/.env
        required: false
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/app/data
      - DATABASE_URL=postgresql://selfsuvis:selfsuvis@postgres:5432/selfsuvis
      - REDIS_URL=redis://redis:6379/0
      - HOME=/app/cache
      - XDG_CACHE_HOME=/app/cache
      - TORCH_HOME=/app/cache/torch
      - OPENCLIP_CACHE_DIR=/app/cache/open_clip
      - TORCHINDUCTOR_CACHE_DIR=/app/cache/inductor
      - LOGNAME=app
    volumes:
      - ${DATA_DIR:-../../.data}:/app/data
      - ${CACHE_DIR:-${DATA_DIR:-../../.data}/.cache}:/app/cache
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  ui:
    build:
      context: ../..
      dockerfile: docker/core/Dockerfile.ui
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - path: ../../src/selfsuvis/env/prod.env
        required: true
      - path: ${DATA_DIR:-../../.data}/.env
        required: false
    environment:
      - API_URL=http://api:8000
      - DATA_DIR=/app/data
    volumes:
      - ${DATA_DIR:-../../.data}:/app/data
    ports:
      - "8501:8501"
    depends_on:
      - api

  nginx:
    image: nginxinc/nginx-unprivileged:1.25-alpine
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ../../config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${DATA_DIR:-../../.data}:/app/data:ro
    ports:
      - "8080:8080"
    depends_on:
      - api

  mediamtx:
    image: bluenviron/mediamtx:1
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS / HTTP
      - "8889:8889"   # WebRTC
      - "8890:8890/udp" # WebRTC ICE/UDP
      - "8189:8189/udp" # WebRTC ICE/UDP
    environment:
      MTX_API: "yes"
      MTX_APIADDRESS: ":9997"
      MTX_RTSPTRANSPORTS: tcp
      MTX_WEBRTCADDITIONALHOSTS: ${MEDIAMTX_WEBRTC_HOST:-127.0.0.1}
    volumes:
      - ../../config/mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - ${DATA_DIR:-../../.data}/mediamtx:/recordings
