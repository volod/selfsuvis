worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Log to stdout/stderr for Docker
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    server {
        listen 8080;
        server_name _;

        # Serve 3DGS splat.ply and related map files for SuperSplat iframe.
        # CORS is required because SuperSplat is served from a different origin
        # and fetches splat.ply via XHR.
        location /static/maps/ {
            alias /app/data/maps/;
            autoindex off;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;

            # Support byte-range requests so large .ply files stream efficiently
            add_header Accept-Ranges bytes always;

            # Pre-flight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "*";
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "Range";
                add_header Content-Length 0;
                return 204;
            }
        }

        # Serve mission HTML reports
        location /static/reports/ {
            alias /app/data/reports/;
            autoindex off;
        }

        # Health check
        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
