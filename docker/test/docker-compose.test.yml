services:
  api:
    user: "${UID}:${GID}"
    env_file:
      - ../../src/selfsuvis/env/test.env
    environment:
      - ALLOWED_INDEX_PATHS=/app/tests/assets
      - BLUR_LAPL_VAR_MIN_FRAME=0
      - DATA_DIR=/app/data
      - MAX_UPLOAD_BYTES=150000
      - HOME=/app/cache
      - XDG_CACHE_HOME=/app/cache
      - TORCH_HOME=/app/cache/torch
      - OPENCLIP_CACHE_DIR=/app/cache/open_clip
    volumes:
      - ../../.data:/app/data
      - ../../tests/assets:/app/tests/assets:ro
      - ../../.data/cache_test:/app/cache
  worker:
    user: "${UID}:${GID}"
    env_file:
      - ../../src/selfsuvis/env/test.env
    environment:
      - BLUR_LAPL_VAR_MIN_FRAME=0
      - DATA_DIR=/app/data
      - HOME=/app/cache
      - XDG_CACHE_HOME=/app/cache
      - TORCH_HOME=/app/cache/torch
      - OPENCLIP_CACHE_DIR=/app/cache/open_clip
    volumes:
      - ../../.data:/app/data
      - ../../tests/assets:/app/tests/assets:ro
      - ../../.data/cache_test:/app/cache
  tests:
    user: "${UID}:${GID}"
    build:
      context: ../..
      dockerfile: docker/test/Dockerfile.tests
    environment:
      - API_URL=http://api:8000
      - ASSETS_DIR=/app/tests/assets
      - INDEX_DIR_PATH=${INDEX_DIR_PATH}
      - HOME=/app/cache
      - XDG_CACHE_HOME=/app/cache
      - TORCH_HOME=/app/cache/torch
      - OPENCLIP_CACHE_DIR=/app/cache/open_clip
      - PYTEST_CACHE_DIR=/tmp/.pytest_cache
    volumes:
      - ../../.data/cache_test:/app/cache
    depends_on:
      - api
      - worker
